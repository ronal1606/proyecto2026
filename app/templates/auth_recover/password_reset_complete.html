<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña Cambiada - AgroVision</title>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10B981; --background-dark: #0f172a; --glass-bg: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.15); --text-main: #F8FAFC; --text-muted: #94A3B8; --theme-bg-orb-1: #10B981; --theme-btn-grad-1: var(--primary); --theme-btn-grad-2: #34D399; }
        [data-theme="indigo"] { --primary: #4F46E5; --theme-bg-orb-1: #4F46E5; --theme-btn-grad-1: var(--primary); --theme-btn-grad-2: #818CF8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { min-height: 100vh; background-color: var(--background-dark); color: var(--text-main); display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        .bg-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: radial-gradient(circle at top right, #312e81 0%, #0f172a 100%); }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; animation: float 20s infinite ease-in-out alternate; }
        .orb-1 { width: 40vw; height: 40vw; background: var(--theme-bg-orb-1); top: -10%; left: -10%; animation-delay: 0s; }
        .orb-2 { width: 35vw; height: 35vw; background: #9333EA; bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(10vw, 10vh) scale(1.1); } }
        .form-section { width: 100%; padding: 2rem; display: flex; justify-content: center; z-index: 10; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 4rem 3rem; width: 100%; max-width: 480px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); text-align: center; }
        .icon-circle { width: 70px; height: 70px; background: rgba(16, 185, 129, 0.15); border: 2px solid #10B981; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #10B981; margin: 0 auto 1.5rem; }
        .form-header h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 1rem; }
        .form-header p { color: var(--text-muted); font-size: 1rem; line-height: 1.5; margin-bottom: 2rem; }
        .btn-submit { display: block; width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--theme-btn-grad-1) 0%, var(--theme-btn-grad-2) 100%); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s; text-decoration: none; box-shadow: 0 10px 20px -10px rgba(79, 70, 229, 0.5); }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 25px -10px rgba(79, 70, 229, 0.7); }
    </style>
</head>
<body x-data="{ theme: localStorage.getItem('theme') || 'green' }" x-init="document.documentElement.setAttribute('data-theme', theme)">
    <div class="bg-container"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
    <div class="form-section">
        <div class="glass-panel">
            <div class="icon-circle" style="color: #10B981; background: rgba(16, 185, 129, 0.15); border-color: #10B981;">
                <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <div class="form-header">
                <h2>¡Contraseña Cambiada!</h2>
                <p>Tu contraseña ha sido restablecida exitosamente. Ahora puedes volver a iniciar sesión de forma segura.</p>
            </div>
            <a href="{% url 'login' %}" class="btn-submit">Ir al Inicio de Sesión</a>
        </div>
    </div>
</body>
</html>
