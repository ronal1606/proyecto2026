<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - AgroVision</title>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981;
            --background-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --theme-bg-orb-1: #10B981;
            --theme-btn-grad-1: var(--primary);
            --theme-btn-grad-2: #34D399;
            --theme-link-color: #34D399;
        }

        [data-theme="indigo"] {
            --primary: #4F46E5;
            --theme-bg-orb-1: #4F46E5;
            --theme-btn-grad-1: var(--primary);
            --theme-btn-grad-2: #818CF8;
            --theme-link-color: #818CF8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { min-height: 100vh; background-color: var(--background-dark); color: var(--text-main); display: flex; align-items: center; justify-content: center; overflow-x: hidden; }

        .bg-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: radial-gradient(circle at top right, #312e81 0%, #0f172a 100%); }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; animation: float 20s infinite ease-in-out alternate; }
        .orb-1 { width: 40vw; height: 40vw; background: var(--theme-bg-orb-1); top: -10%; left: -10%; animation-delay: 0s; }
        .orb-2 { width: 35vw; height: 35vw; background: #9333EA; bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(10vw, 10vh) scale(1.1); } }

        .form-section { width: 100%; padding: 2rem; display: flex; justify-content: center; z-index: 10; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 3rem; width: 100%; max-width: 480px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }

        .form-header { margin-bottom: 2rem; text-align: center; }
        .form-header h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
        .form-header p { color: var(--text-muted); font-size: 0.95rem; }

        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500; color: #E2E8F0; }
        .input-field { width: 100%; padding: 1rem 1.25rem; background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        .input-field:focus { background: rgba(15, 23, 42, 0.6); border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15); }
        
        .btn-submit { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--theme-btn-grad-1) 0%, var(--theme-btn-grad-2) 100%); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 1rem; box-shadow: 0 10px 20px -10px rgba(79, 70, 229, 0.5); }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 25px -10px rgba(79, 70, 229, 0.7); }

        .back-link { display: inline-block; margin-top: 2rem; color: var(--theme-link-color); text-decoration: none; font-size: 0.95rem; font-weight: 600; text-align: center; width: 100%; }
        .back-link:hover { text-decoration: underline; }
        
        .errorlist { color: #f87171; font-size: 0.85rem; list-style: none; margin-top: 0.5rem; padding: 0; }
    </style>
</head>
<body x-data="{ theme: localStorage.getItem('theme') || 'green' }" x-init="document.documentElement.setAttribute('data-theme', theme)">
    <div class="bg-container"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <div class="form-section">
        <div class="glass-panel">
            <div class="form-header">
                <h2>Recuperar Contraseña</h2>
                <p>Ingresa tu correo electrónico y te enviaremos un enlace para restablecerla.</p>
            </div>

            <form method="post">
                {% csrf_token %}
                
                {% if form.errors %}
                <div style="background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #FECACA; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.9rem;">
                    Por favor, corrige los errores o ingresa un correo válido.
                </div>
                {% endif %}

                <div class="input-group">
                    <label for="id_email">Correo Electrónico</label>
                    <input type="email" name="email" id="id_email" class="input-field" placeholder="ejemplo@correo.com" required autocomplete="email" autofocus>
                </div>

                <button type="submit" class="btn-submit">Enviar enlace de recuperación</button>
            </form>

            <a href="{% url 'login' %}" class="back-link">← Volver al Inicio de Sesión</a>
        </div>
    </div>
</body>
</html>
